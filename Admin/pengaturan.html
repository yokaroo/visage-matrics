    <script>
        const supabaseUrl = 'https://matupwbsbobphzumkljw.supabase.co';
        const supabaseKey = 'sb_publishable_-O-jVHa8P8LKAnz4Q-SPYg_DVVGwE6f';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let currentAdminUser = null;

        // 1. Cek Auth Admin & Load Data Profil
        async function initPengaturan() {
            try {
                // Ambil sesi user
                const { data: { user }, error: authError } = await _supabase.auth.getUser();
                if (authError || !user) return window.location.replace('../User/login.html');

                currentAdminUser = user;

                // Set tampilan sidebar
                document.getElementById('admin-email-display').innerText = user.email;

                // Ambil profil admin dari database
                const { data: profile, error: profileError } = await _supabase
                    .from('profil_pengguna')
                    .select('*')
                    .eq('id', user.id)
                    .single();

                if (profileError) {
                    console.error("Gagal memuat profil:", profileError);
                    return;
                }

                // Isi Form dengan data profil
                document.getElementById('input-nama').value = profile.nama_lengkap || "";
                document.getElementById('input-email').value = user.email || "";
                document.getElementById('input-role').value = (profile.role || "Admin").toUpperCase();

                // Update nama di sidebar
                document.getElementById('admin-name-display').innerText = profile.nama_lengkap || "Admin Utama";

            } catch (err) {
                console.error("Error init:", err);
            }
        }

        // 2. Proses Menyimpan Perubahan
        document.getElementById('formProfil').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btnSave = document.getElementById('btn-save');
            const teksAsli = btnSave.innerHTML;
            btnSave.innerHTML = 'Memproses...';
            btnSave.disabled = true;

            try {
                // A. Update Nama di Tabel profil_pengguna
                const namaBaru = document.getElementById('input-nama').value.trim();

                if (namaBaru) {
                    const { error: profileError } = await _supabase
                        .from('profil_pengguna')
                        .update({ nama_lengkap: namaBaru })
                        .eq('id', currentAdminUser.id);

                    if (profileError) throw profileError;
                }

                // B. Update Password (Jika Diisi)
                const passBaru = document.getElementById('input-pass-baru').value;
                const passKonfirmasi = document.getElementById('input-pass-konfirmasi').value;

                if (passBaru !== "") {
                    if (passBaru.length < 6) {
                        throw new Error("Password baru minimal 6 karakter.");
                    }
                    if (passBaru !== passKonfirmasi) {
                        throw new Error("Konfirmasi password tidak cocok!");
                    }

                    const { error: passError } = await _supabase.auth.updateUser({
                        password: passBaru
                    });

                    if (passError) throw passError;

                    // Bersihkan input password setelah sukses
                    document.getElementById('input-pass-baru').value = "";
                    document.getElementById('input-pass-konfirmasi').value = "";
                }

                // Berhasil
                alert("Pengaturan akun berhasil diperbarui!");
                initPengaturan(); // Refresh data

            } catch (err) {
                alert("Gagal memperbarui pengaturan: " + err.message);
            } finally {
                btnSave.innerHTML = teksAsli;
                btnSave.disabled = false;
            }
        });

        // 3. Fungsi Logout
        async function adminLogout() {
            await _supabase.auth.signOut();
            localStorage.clear();
            window.location.replace('../User/index.html');
        }

        // Jalankan saat halaman dimuat
        document.addEventListener('DOMContentLoaded', initPengaturan);
    </script>
