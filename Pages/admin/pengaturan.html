<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan Akun - Admin Visage Metrics</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Poppins', 'sans-serif'] } } }
        }
    </script>
    <style>
        body { background-color: #f8fafc; color: #1e293b; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .bg-cyber { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at 15% 50%, #ffffff, transparent 60%), radial-gradient(circle at 85% 30%, #f0f9ff, transparent 60%); }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(226, 232, 240, 1); box-shadow: 0 10px 30px rgba(14, 165, 233, 0.05); }
        .sidebar-item { transition: all 0.3s ease; }
        .sidebar-item:hover, .sidebar-item.active { background-color: #f0f9ff; color: #0284c7; border-right: 4px solid #0284c7; }
        .no-scrollbar::-webkit-scrollbar { display: none; } .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

<body class="antialiased flex h-screen overflow-hidden selection:bg-sky-200">
    <div class="bg-cyber"></div>
    <div class="bg-grid"></div>

    <aside class="w-72 bg-white/90 backdrop-blur-xl border-r border-slate-200 flex flex-col z-20 h-full shadow-[10px_0_30px_rgba(14,165,233,0.05)] shrink-0">
        <div class="h-24 flex items-center px-8 border-b border-slate-200 shrink-0">
            <a href="dashboard.html" class="flex items-center gap-3 group">
                <div class="w-10 h-10 flex items-center justify-center text-sky-500 rounded-xl bg-sky-50 border border-sky-100">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </div>
                <div><div class="font-black text-lg tracking-[0.2em] text-[#002D5B] leading-none">VISAGE</div><div class="font-bold text-[10px] tracking-[0.4em] text-sky-500 mt-1 uppercase">Admin Panel</div></div>
            </a>
        </div>

        <nav class="flex-grow overflow-y-auto no-scrollbar py-8 flex flex-col gap-2">
            <p class="px-8 text-[10px] font-bold tracking-[0.2em] text-slate-400 uppercase mb-2">Menu Utama</p>
            
            <a href="dashboard.html" class="sidebar-item flex items-center gap-4 px-8 py-4 text-sm font-bold text-slate-600">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
                Dashboard
            </a>

            <a href="data_analitik_hari_ini.html" class="sidebar-item flex items-center gap-4 px-8 py-4 text-sm font-bold text-slate-600">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                Data Analitik
            </a>

            <a href="manajemen_user.html" class="sidebar-item flex items-center gap-4 px-8 py-4 text-sm font-bold text-slate-600">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                Manajemen User
            </a>
            
            <a href="pengaturan.html" class="sidebar-item active flex items-center gap-4 px-8 py-4 text-sm font-bold text-slate-600">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                Pengaturan
            </a>
        </nav>

        <div class="p-6 border-t border-slate-200 bg-slate-50/50 shrink-0">
            <div class="flex items-center gap-4 mb-4">
                <div class="w-10 h-10 rounded-full bg-sky-100 border border-sky-200 flex items-center justify-center text-xl shadow-sm">👨‍💼</div>
                <div><h4 class="text-sm font-bold text-slate-800">Admin Utama</h4><p class="text-[10px] text-sky-600 font-bold uppercase tracking-widest">ID: ADM-001</p></div>
            </div>
            <button onclick="window.location.replace('../../login.html');" class="w-full py-3 bg-white border border-red-200 text-red-500 hover:bg-red-50 rounded-xl font-bold transition-all tracking-[0.2em] text-[10px] uppercase flex justify-center items-center gap-2 shadow-sm">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                Logout
            </button>
        </div>
    </aside>

    <div class="flex-grow flex flex-col h-full overflow-hidden relative z-10 w-full">
        
        <header class="h-24 bg-white/60 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-10 shrink-0">
            <div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tight">Pengaturan Akun</h1>
                <p class="text-xs text-slate-500 font-medium mt-1">Kelola informasi personal dan keamanan akses sistem</p>
            </div>
            
            <div class="flex items-center gap-4">
                <button type="button" class="px-6 py-2.5 bg-white border border-slate-200 text-slate-600 font-bold rounded-xl text-sm hover:bg-slate-50 transition shadow-sm tracking-wide">
                    Batal
                </button>
                <button type="submit" form="formProfil" class="px-6 py-2.5 bg-sky-500 hover:bg-sky-600 text-white font-bold rounded-xl text-sm shadow-md shadow-sky-200 transition tracking-wide flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>
                    Simpan Perubahan
                </button>
            </div>
        </header>

        <main class="flex-grow overflow-y-auto p-6 md:p-10 no-scrollbar relative w-full">
            
            <form id="formProfil" action="#" method="POST" class="max-w-4xl mx-auto space-y-8 pb-10">
                
                <div class="glass-panel p-8 md:p-10 rounded-[2.5rem] w-full">
                    <h2 class="text-xl font-black text-slate-800 mb-6 border-b border-slate-100 pb-4 flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-sky-50 flex items-center justify-center text-sky-500">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                        </div>
                        Informasi Personal
                    </h2>
                    <div class="space-y-6">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Nama Lengkap</label>
                            <input type="text" value="Admin Utama" class="w-full px-5 py-4 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-sky-500 focus:border-transparent outline-none font-semibold text-slate-700 shadow-sm transition">
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">ID Admin / NIP</label>
                                <input type="text" value="ADM-001" disabled class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl outline-none font-semibold text-slate-400 cursor-not-allowed">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Peran / Role</label>
                                <input type="text" value="Sistem Administrator" disabled class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl outline-none font-semibold text-sky-600 cursor-not-allowed">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="glass-panel p-8 md:p-10 rounded-[2.5rem] w-full">
                    <h2 class="text-xl font-black text-slate-800 mb-6 border-b border-slate-100 pb-4 flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-amber-50 flex items-center justify-center text-amber-500">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                        </div>
                        Keamanan Akun
                    </h2>
                    <div class="space-y-6">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Password Saat Ini</label>
                            <input type="password" placeholder="Masukkan password lama untuk verifikasi" class="w-full px-5 py-4 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-sky-500 focus:border-transparent outline-none font-semibold text-slate-700 shadow-sm transition">
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-2 border-t border-slate-50">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Password Baru</label>
                                <input type="password" placeholder="Minimal 8 karakter" class="w-full px-5 py-4 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-sky-500 focus:border-transparent outline-none font-semibold text-slate-700 shadow-sm transition">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Konfirmasi Password Baru</label>
                                <input type="password" placeholder="Ulangi password baru" class="w-full px-5 py-4 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-sky-500 focus:border-transparent outline-none font-semibold text-slate-700 shadow-sm transition">
                            </div>
                        </div>
                    </div>
                </div>

            </form>
        </main>
    </div>

    <script src="../../assets/js/pengaturan.js"></script>
</body>
</html>
