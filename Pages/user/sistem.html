<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Analisis - Visage Metrics Core</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    },
                    animation: {
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'scanline': 'scanline 3s linear infinite',
                    },
                    keyframes: {
                        scanline: {
                            '0%': { transform: 'translateY(-100%)' },
                            '100%': { transform: 'translateY(100%)' }
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="font-sans min-h-screen flex flex-col bg-slate-50 selection:bg-sky-200 pt-20">

    <nav class="fixed top-0 w-full bg-white/80 backdrop-blur-xl border-b border-slate-200 z-40 transition-all duration-300"
        id="navbar">
        <div class="max-w-[90rem] mx-auto px-6 lg:px-10">
            <div class="flex justify-between items-center h-24">
                <a href="#" class="flex items-center gap-3 group">
                    <div class="w-10 h-10 flex items-center justify-center text-sky-500 rounded-xl">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                            stroke-linecap="round" stroke-linejoin="round"
                            class="w-7 h-7 transition-all duration-300 group-hover:scale-110">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                            <circle cx="12" cy="12" r="1" fill="currentColor"></circle>
                        </svg>
                    </div>
                    <div
                        class="font-black text-xl tracking-[0.2em] text-slate-800 uppercase group-hover:text-sky-600 transition">
                        VISAGE METRICS</div>
                </a>
                <button id="btn-logout-gate"
                    class="px-6 py-2.5 bg-white border border-red-200 text-red-500 rounded-full font-bold text-xs hover:bg-red-500 hover:text-white transition-all shadow-sm uppercase tracking-widest">Logout</button>
            </div>
        </div>
    </nav>

    <main class="flex-grow p-4 md:px-8 max-w-[85rem] mx-auto w-full flex flex-col pt-8">
        <div class="mb-4">
            <h2 class="text-3xl font-black text-slate-800 uppercase leading-none">Image Analysis</h2>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.3em] mt-2">Static Biometric Extraction
                Pipeline</p>
        </div>

        <div class="grid lg:grid-cols-5 gap-8 items-start">
            <div class="lg:col-span-3 flex flex-col gap-4">
                <div class="bg-white p-4 rounded-3xl relative h-[300px] md:h-[400px] w-full shadow-lg overflow-hidden border-2 border-dashed border-slate-300 hover:border-sky-400 transition-all cursor-pointer group"
                    id="dropzone-area">
                    <input type="file" id="imageInput" accept="image/*" class="hidden">
                    <div
                        class="relative w-full h-full rounded-2xl overflow-hidden flex items-center justify-center bg-slate-50/50">
                        <img id="imagePreview" src="" class="w-full h-full object-contain hidden z-10">
                        <div id="scan-effect"
                            class="absolute w-full h-[3px] bg-sky-400 shadow-[0_0_20px_#0ea5e9] animate-scanline hidden z-20">
                        </div>
                        <div id="upload-placeholder" class="absolute flex flex-col items-center text-center">
                            <svg xmlns="http://www.w3.org/2000/svg"
                                class="h-10 w-10 text-slate-300 mb-2 group-hover:scale-110 transition-transform"
                                fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                            </svg>
                            <p class="text-slate-400 font-bold text-[10px] uppercase tracking-wider px-4">Pilih Foto
                                Untuk Dianalisis</p>
                        </div>
                    </div>
                </div>

                <div class="flex gap-4 w-full justify-center">
                    <div
                        class="flex-1 bg-white p-3 rounded-2xl flex flex-col items-center border border-slate-200 shadow-sm">
                        <p class="text-[9px] font-bold text-slate-400 uppercase mb-2">Mata Kanan</p>
                        <canvas id="canvasKanan" width="84" height="84"
                            class="w-16 h-16 md:w-20 md:h-20 bg-slate-50 rounded-lg object-cover"></canvas>
                    </div>
                    <div
                        class="flex-1 bg-white p-3 rounded-2xl flex flex-col items-center border border-slate-200 shadow-sm">
                        <p class="text-[9px] font-bold text-slate-400 uppercase mb-2">Mata Kiri</p>
                        <canvas id="canvasKiri" width="84" height="84"
                            class="w-16 h-16 md:w-20 md:h-20 bg-slate-50 rounded-lg object-cover"></canvas>
                    </div>
                </div>

                <div class="flex gap-4 w-full">
                    <button id="btn-upload"
                        class="flex-1 py-4 bg-white border border-slate-200 hover:bg-slate-50 transition-colors font-bold rounded-2xl text-xs uppercase tracking-widest shadow-sm text-slate-600">Pilih
                        Gambar</button>
                    <button id="btn-analyze" disabled
                        class="flex-1 py-4 bg-sky-500 hover:bg-sky-600 transition-colors text-white font-bold rounded-2xl text-xs uppercase tracking-widest opacity-50 cursor-not-allowed shadow-md">Mulai
                        Analisis</button>
                    <button id="btn-reset" disabled
                        class="flex-1 py-4 bg-slate-100 hover:bg-slate-200 transition-colors text-slate-400 font-bold rounded-2xl text-xs uppercase tracking-widest opacity-50 cursor-not-allowed">Hapus</button>
                </div>
            </div>

            <div class="lg:col-span-2 flex flex-col">
                <div class="flex flex-col items-end mb-3 font-mono uppercase">
                    <div class="flex gap-2 text-right">
                        <span class="text-slate-400 font-bold text-[11px] tracking-tighter">MODEL:</span>
                        <span
                            class="text-emerald-500 font-black text-[16px] leading-none italic">MobileNetV2-Hybrid-Ensemble</span>
                    </div>
                    <div class="flex gap-2 text-right mt-0.5">
                        <span class="text-slate-300 font-bold text-[9px] tracking-tighter">STATUS:</span>
                        <span class="text-sky-400 font-black text-[9px]">SYSTEM_ACTIVE</span>
                    </div>
                </div>

                <div
                    class="bg-white rounded-3xl p-8 shadow-xl border border-slate-100 flex flex-col relative overflow-hidden min-h-[440px]">
                    <div class="mb-6 pb-4 border-b flex justify-between items-center">
                        <h3 class="text-slate-800 font-black text-xs uppercase tracking-widest">Metrik Analisis</h3>
                        <div id="status-indicator"
                            class="w-3 h-3 rounded-full bg-slate-200 transition-colors duration-500 shadow-sm"></div>
                    </div>

                    <div class="flex-grow flex flex-col items-center justify-center">
                        <div id="res-placeholder"
                            class="text-slate-300 text-[10px] font-black uppercase text-center animate-pulse tracking-widest">
                            Menunggu Input Gambar...</div>

                        <div id="res-sayu" class="hidden text-center w-full">
                            <div
                                class="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl animate-pulse-fast shadow-inner">
                                ⚠️</div>
                            <h3 class="text-4xl font-black text-slate-800 uppercase tracking-tighter">Mata Sayu</h3>
                            <div class="bg-slate-50 rounded-xl p-4 mt-4 border border-slate-100">
                                <p class="text-xs text-slate-600 font-medium leading-relaxed italic"></p>
                            </div>
                        </div>

                        <div id="res-segar" class="hidden text-center w-full">
                            <div
                                class="w-20 h-20 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl shadow-inner">
                                ✅</div>
                            <h3 class="text-4xl font-black text-slate-800 uppercase tracking-tighter">Mata Segar</h3>
                            <div class="bg-slate-50 rounded-xl p-4 mt-4 border border-slate-100">
                                <p class="text-xs text-slate-600 font-medium leading-relaxed italic"></p>
                            </div>
                        </div>
                    </div>

                    <form class="mt-8 border-t pt-6">
                        <button type="submit" id="btn-save" disabled
                            class="w-full py-4 bg-slate-50 hover:bg-slate-100 transition-colors border border-slate-200 text-slate-400 font-bold rounded-2xl text-xs uppercase opacity-50 cursor-not-allowed tracking-widest">Simpan
                            Klasifikasi</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="../../assets/js/sistem.js?v=999"></script>
    <script>
        document.getElementById('btn-logout-gate').onclick = (e) => {
            e.preventDefault();
            Swal.fire({
                title: 'Konfirmasi Keluar',
                text: "Apakah Anda ingin berkonsultasi mengenai hasil analisis dengan Asisten Visage sebelum logout?",
                icon: 'question',
                showDenyButton: true,
                showCancelButton: true,
                confirmButtonColor: '#0ea5e9',
                denyButtonColor: '#ef4444',
                cancelButtonColor: '#94a3b8',
                confirmButtonText: '🩺 Ya, Konsultasi',
                denyButtonText: '🚪 Tidak, Logout Saja',
                cancelButtonText: 'Batal'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = "asisten_visage.html";
                } else if (result.isDenied) {
                    window.location.href = "landing.html";
                }
            });
        };
    </script>
</body>

</html>
