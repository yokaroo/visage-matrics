<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pengguna - Visage Metrics</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    animation: { 'blob': 'blob 12s infinite alternate' },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '50%': { transform: 'translate(50px, -50px) scale(1.2)' },
                            '100%': { transform: 'translate(-50px, 20px) scale(0.9)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f8fafc;
            color: #1e293b;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        .bg-cyber {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: radial-gradient(circle at 15% 50%, #ffffff, transparent 60%), radial-gradient(circle at 85% 30%, #f0f9ff, transparent 60%);
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: linear-gradient(to right, rgba(14, 165, 233, 0.08) 1px, transparent 1px), linear-gradient(to bottom, rgba(14, 165, 233, 0.08) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(226, 232, 240, 1);
            box-shadow: 0 40px 100px -20px rgba(14, 165, 233, 0.15);
        }

        .input-with-icon {
            padding-left: 3.5rem;
        }

        .icon-container {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            transition: color 0.3s;
        }

        input:focus+.icon-container,
        select:focus+.icon-container {
            color: #0ea5e9;
        }
    </style>
</head>

<body class="antialiased min-h-screen flex flex-col selection:bg-sky-200">
    <div class="bg-cyber"></div>
    <div class="bg-grid"></div>
    <div
        class="fixed top-[10%] right-[5%] w-[35vw] h-[35vw] bg-sky-400/10 rounded-full blur-[120px] animate-blob pointer-events-none z-[-1]">
    </div>

    <nav
        class="w-full bg-white/80 backdrop-blur-xl border-b border-slate-200 z-50 sticky top-0 shadow-sm transition-all duration-300">
        <div class="max-w-7xl mx-auto px-6 lg:px-10">
            <div class="flex justify-between items-center h-20">
                <a href="index.html" class="flex items-center gap-3 group">
                    <div class="w-9 h-9 flex items-center justify-center text-sky-500 rounded-xl">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                            stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </div>
                    <div class="font-black text-lg tracking-[0.2em] text-[#002D5B] uppercase">VISAGE METRICS</div>
                </a>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6 py-16">
        <div class="glass-card w-full max-w-2xl rounded-[3rem] p-10 md:p-14 relative overflow-hidden bg-white">
            <div class="relative z-10 mb-12">
                <span class="text-sky-500 font-bold tracking-[0.3em] text-[10px] uppercase">Final Step •
                    Registration</span>
                <h1 class="text-3xl md:text-4xl font-black text-[#002D5B] mt-2 tracking-tight">LENGKAPI <span
                        class="text-sky-500">PROFIL</span></h1>
                <p class="text-slate-500 font-medium mt-3 text-sm leading-relaxed">Silakan lengkapi data akademik Anda
                    untuk mengaktifkan sistem deteksi kelelahan visual secara personal.</p>
            </div>

            <form id="profilForm" class="space-y-8 relative z-10">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-2">
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">NIM</label>
                        <div class="relative group">
                            <input type="text" id="nim" placeholder="Masukkan NIM" required
                                class="input-with-icon w-full pr-4 py-3.5 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-sky-500 transition text-slate-800 font-medium text-sm shadow-inner">
                            <div class="icon-container"><svg class="h-5 w-5" fill="none" stroke="currentColor"
                                    stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2" />
                                </svg></div>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Jenis
                            Kelamin</label>
                        <div class="relative group">
                            <select id="gender" required
                                class="input-with-icon w-full pr-4 py-3.5 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-sky-500 transition text-slate-800 appearance-none font-medium text-sm shadow-inner cursor-pointer">
                                <option value="" disabled selected>Pilih Gender</option>
                                <option value="Laki-laki">Laki-laki</option>
                                <option value="Perempuan">Perempuan</option>
                            </select>
                            <div class="icon-container"><svg class="h-5 w-5" fill="none" stroke="currentColor"
                                    stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                </svg></div>
                            <div class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                                <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="3"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                                </svg></div>
                        </div>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Program
                        Studi</label>
                    <div class="relative group">
                        <select id="prodi" required
                            class="input-with-icon w-full pr-4 py-3.5 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-sky-500 transition text-slate-800 appearance-none font-medium text-sm shadow-inner cursor-pointer">
                            <option value="" disabled selected>Pilih Program Studi</option>
                            <option value="S1 Sains Data">S1 Sains Data</option>
                            <option value="S1 Teknik Informatika">S1 Teknik Informatika</option>
                            <option value="S1 Sistem Informasi">S1 Sistem Informasi</option>
                            <option value="S1 Rekayasa Perangkat Lunak">S1 Rekayasa Perangkat Lunak</option>
                            <option value="S1 Teknologi Informasi">S1 Teknologi Informasi</option>
                        </select>
                        <div class="icon-container"><svg class="h-5 w-5" fill="none" stroke="currentColor"
                                stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                            </svg></div>
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"><svg
                                class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                            </svg></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-2">
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Usia Saat
                            Ini</label>
                        <div class="relative group">
                            <input type="number" id="usia" placeholder="Contoh: 20" required min="15" max="60"
                                class="input-with-icon w-full pr-4 py-3.5 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-sky-500 transition text-slate-800 font-medium text-sm shadow-inner">
                            <div class="icon-container"><svg class="h-5 w-5" fill="none" stroke="currentColor"
                                    stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg></div>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label
                            class="block text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Angkatan</label>
                        <div class="relative group">
                            <input type="number" id="angkatan" placeholder="Contoh: 2023" required min="2015" max="2030"
                                class="input-with-icon w-full pr-4 py-3.5 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-sky-500 transition text-slate-800 font-medium text-sm shadow-inner">
                            <div class="icon-container"><svg class="h-5 w-5" fill="none" stroke="currentColor"
                                    stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                </svg></div>
                        </div>
                    </div>
                </div>

                <div class="mt-12 flex justify-end border-t border-slate-100 pt-8">
                    <button type="submit" id="btn-submit"
                        class="group flex items-center gap-3 px-10 py-4 bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-400 hover:to-blue-500 text-white font-black rounded-full shadow-[0_10px_20px_rgba(14,165,233,0.3)] transition-all active:scale-[0.98] tracking-[0.2em] text-sm uppercase">
                        INISIALISASI SISTEM
                        <svg class="h-5 w-5 group-hover:translate-x-1 transition-transform" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer
        class="py-8 text-center text-slate-400 text-[9px] tracking-[0.5em] uppercase border-t border-slate-100 bg-white font-bold">
        &copy; 2026 VISAGE METRICS • RESEARCH & DEVELOPMENT • UNIT TELKOM UNIVERSITY PURWOKERTO
    </footer>

    <script>
        const supabaseUrl = 'https://matupwbsbobphzumkljw.supabase.co';
        const supabaseKey = 'sb_publishable_-O-jVHa8P8LKAnz4Q-SPYg_DVVGwE6f';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('profilForm').onsubmit = async (e) => {
            e.preventDefault();
            const btnSubmit = document.getElementById('btn-submit');
            btnSubmit.innerHTML = 'MENYIMPAN...';
            btnSubmit.disabled = true;

            const { data: { session }, error: sessionError } = await _supabase.auth.getSession();
            if (!session) {
                alert("Sesi tidak ditemukan. Silakan login terlebih dahulu.");
                return window.location.href = "login.html";
            }

            const user = session.user;
            const fullName = user.user_metadata?.full_name || 'Mahasiswa Baru';
            const nimVal = document.getElementById('nim').value;
            const genderVal = document.getElementById('gender').value;
            const prodiVal = document.getElementById('prodi').value;
            const usiaVal = document.getElementById('usia').value;
            const angkatanVal = document.getElementById('angkatan').value;

            // PERUBAHAN: MENGGUNAKAN UPSERT AGAR TIDAK ERROR "DUPLICATE KEY"
            const { error } = await _supabase
                .from('profil_pengguna')
                .upsert({
                    id: user.id,
                    nim: nimVal,
                    nama_lengkap: fullName,
                    jenis_kelamin: genderVal,
                    prodi: prodiVal,
                    usia: parseInt(usiaVal),
                    angkatan: parseInt(angkatanVal),
                    status_akun: 'Menunggu'
                });

            if (error) {
                alert("Gagal menyimpan profil: " + error.message);
                btnSubmit.innerHTML = 'INISIALISASI SISTEM <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6" /></svg>';
                btnSubmit.disabled = false;
            } else {
                alert("Profil berhasil disimpan! Mengalihkan ke sistem utama...");
                window.location.href = "sistem.html";
            }
        };
    </script>
</body>

</html>
