<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pengguna - Visage Metrics</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    animation: {
                        'blob': 'blob 12s infinite alternate',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '50%': { transform: 'translate(50px, -50px) scale(1.2)' },
                            '100%': { transform: 'translate(-50px, 20px) scale(0.9)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* TEMA TERANG SESUAI INDEX/LOGIN/REGISTER/ABOUT */
        body {
            background-color: #f8fafc;
            color: #1e293b;
            overflow-x: hidden;
        }

        .bg-cyber {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: radial-gradient(circle at 15% 50%, #ffffff, transparent 60%),
                        radial-gradient(circle at 85% 30%, #f0f9ff, transparent 60%);
        }

        /* Grid Biru Tipis */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: 
                linear-gradient(to right, rgba(14, 165, 233, 0.08) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(14, 165, 233, 0.08) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        /* Glass Card Terang untuk Form */
        .glass-card-form {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(226, 232, 240, 1);
            box-shadow: 0 40px 100px -20px rgba(14, 165, 233, 0.15), 0 0 0 1px rgba(226, 232, 240, 0.8);
        }

        /* Styling dropdown agar sesuai Light Mode */
        select option {
            background-color: #ffffff;
            color: #1e293b;
        }
        
        .input-with-icon {
            padding-left: 3.2rem;
        }

        /* Validasi Warna (Merah saat error) */
        input:invalid:focus {
            border-color: #ef4444;
            box-shadow: 0 0 0 1px #ef4444;
        }
    </style>
</head>

<body class="font-sans antialiased min-h-screen flex flex-col relative selection:bg-sky-200">

    <div class="bg-cyber"></div>
    <div class="bg-grid"></div>

    <div class="fixed top-[10%] right-[10%] w-[30vw] h-[30vw] bg-sky-400/20 rounded-full blur-[100px] animate-blob pointer-events-none z-[-1]"></div>
    <div class="fixed bottom-[10%] left-[10%] w-[30vw] h-[30vw] bg-blue-400/10 rounded-full blur-[100px] animate-blob pointer-events-none z-[-1]" style="animation-delay: 4s;"></div>

    <nav class="w-full bg-white/80 backdrop-blur-xl border-b border-slate-200 z-50 sticky top-0 shadow-sm transition-all duration-300">
        <div class="max-w-[90rem] mx-auto px-6 lg:px-10">
            <div class="flex justify-between items-center h-24">
                
                <a href="index.html" class="flex items-center gap-3 group">
                    <div class="w-10 h-10 flex items-center justify-center text-sky-500 rounded-xl">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="w-7 h-7 transition-all duration-300 group-hover:scale-110">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                            <circle cx="12" cy="12" r="1" fill="currentColor"></circle>
                        </svg>
                    </div>
                    <div class="font-black text-xl tracking-[0.25em] text-[#002D5B] uppercase group-hover:text-sky-600 transition-colors">VISAGE METRICS</div>
                </a>
                
                <div>
                    <a href="index.html" class="group flex items-center gap-2 text-xs font-bold tracking-widest text-slate-500 hover:text-sky-600 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 group-hover:-translate-x-1 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                        </svg>
                        KEMBALI KE HOME
                    </a>
                </div>
                
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-4 md:p-8 relative z-10 py-12">
        
        <div class="glass-card-form rounded-[2.5rem] p-8 md:p-12 w-full max-w-4xl relative overflow-hidden">
            <div class="absolute -top-24 -right-24 w-64 h-64 bg-sky-200/50 rounded-full blur-[60px] pointer-events-none"></div>
            
            <div class="relative z-10">
                <div class="text-center mb-12">
                    <h2 class="text-3xl md:text-4xl font-extrabold tracking-tight text-slate-800 mb-3">Form Pengguna</h2>
                    <p class="text-slate-500 text-sm font-medium">Lengkapi profil Anda sebelum memulai sesi kalibrasi</p>
                    <div class="w-16 h-1.5 bg-sky-500 mx-auto mt-6 rounded-full shadow-sm"></div>
                </div>

                <form action="sistem.html" method="GET" class="space-y-6">
                    <div class="grid md:grid-cols-2 gap-6">
                        
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-500 tracking-widest ml-1 uppercase">Nama Lengkap</label>
                            <div class="relative">
                                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-sky-500">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                                </span>
                                <input type="text" name="nama" placeholder="Masukkan nama Anda" required
                                    pattern="[A-Za-z\s]+" title="Nama hanya boleh berisi huruf dan spasi."
                                    class="input-with-icon w-full pr-4 py-3.5 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition text-slate-800 placeholder:text-slate-400 font-medium text-sm shadow-inner">
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-500 tracking-widest ml-1 uppercase">Usia</label>
                            <div class="relative">
                                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-sky-500">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                                </span>
                                <input type="number" name="usia" placeholder="Contoh: 21" required min="15" max="60"
                                    class="input-with-icon w-full pr-4 py-3.5 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition text-slate-800 placeholder:text-slate-400 font-medium text-sm shadow-inner">
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-500 tracking-widest ml-1 uppercase">Jenis Kelamin</label>
                            <div class="relative">
                                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-sky-500 pointer-events-none">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                                </span>
                                <select name="jenis_kelamin" required
                                    class="input-with-icon w-full pr-4 py-3.5 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition text-slate-800 appearance-none shadow-inner cursor-pointer font-medium text-sm">
                                    <option value="" disabled selected hidden class="text-slate-400">Pilih Jenis Kelamin</option>
                                    <option value="L">Laki-laki</option>
                                    <option value="P">Perempuan</option>
                                </select>
                                <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-slate-400">
                                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-500 tracking-widest ml-1 uppercase">Nomor Induk Mahasiswa (NIM)</label>
                            <div class="relative">
                                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-sky-500">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2" /></svg>
                                </span>
                                <input type="text" name="nim" placeholder="Contoh: 1201230001" required
                                    pattern="[0-9]+" title="NIM hanya boleh berisi angka (integer)."
                                    class="input-with-icon w-full pr-4 py-3.5 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition text-slate-800 placeholder:text-slate-400 font-medium text-sm shadow-inner">
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-500 tracking-widest ml-1 uppercase">Program Studi</label>
                            <div class="relative">
                                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-sky-500">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M12 14l9-5-9-5-9 5 9 5z" /><path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222" /></svg>
                                </span>
                                <input type="text" name="prodi" placeholder="Contoh: S1 Sains Data" required
                                    pattern="^[A-Z][0-9]\s.*$" title="Harus dimulai dengan jenjang (contoh: S1) diikuti spasi dan nama prodi."
                                    class="input-with-icon w-full pr-4 py-3.5 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition text-slate-800 placeholder:text-slate-400 font-medium text-sm shadow-inner">
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-500 tracking-widest ml-1 uppercase">Tahun Angkatan</label>
                            <div class="relative">
                                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-sky-500">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>
                                </span>
                                <input type="number" name="angkatan" placeholder="Contoh: 2023" required min="2015" max="2030"
                                    class="input-with-icon w-full pr-4 py-3.5 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition text-slate-800 placeholder:text-slate-400 font-medium text-sm shadow-inner">
                            </div>
                        </div>
                    </div>

                    <div class="mt-12 flex justify-end border-t border-slate-100 pt-8">
                        <button type="submit"
                            class="group flex items-center gap-3 px-10 py-4 bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-400 hover:to-blue-500 text-white font-black rounded-full shadow-[0_10px_20px_rgba(14,165,233,0.3)] transition-all active:scale-[0.98] tracking-[0.2em] text-sm uppercase">
                            INISIALISASI SISTEM
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7-7m7-7H3" />
                            </svg>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

</body>

</html>
