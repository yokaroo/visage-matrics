<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otentikasi - Visage Metrics</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    animation: {
                        'pulse-slow': 'pulse 8s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'scan': 'scan 2.5s linear infinite',
                        'spin-slow': 'spin 15s linear infinite',
                        'eye-blink': 'blink 4s ease-in-out infinite',
                        'float': 'float 6s ease-in-out infinite',
                    }
                }
            }
        }
    </script>

    <script type="module" src="assets/js/login.js"></script>
</head>

<body class="text-slate-800 font-sans min-h-screen flex flex-col relative selection:bg-sky-200">
    <div class="neural-grid opacity-80"></div>

    <nav class="w-full bg-white/80 backdrop-blur-xl border-b border-slate-200 z-50 relative shadow-sm">
        <div class="max-w-[90rem] mx-auto px-6 lg:px-10">
            <div class="flex items-center h-24">
                <a href="Pages/user/landing.html" class="flex items-center gap-4 group">
                    <div class="w-11 h-11 flex items-center justify-center text-sky-500 rounded-xl">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                            stroke-linecap="round" stroke-linejoin="round"
                            class="w-7 h-7 transition-all duration-300 group-hover:scale-110">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                            <circle cx="12" cy="12" r="1" fill="currentColor"></circle>
                        </svg>
                    </div>
                    <div
                        class="font-black text-xl tracking-[0.25em] text-slate-800 uppercase group-hover:text-sky-600 transition">
                        VISAGE METRICS</div>
                </a>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex relative z-10 max-w-[90rem] mx-auto w-full">
        <div class="hidden lg:flex w-1/2 flex-col items-center justify-start pt-28 relative overflow-hidden">
            <div class="absolute w-[600px] h-[600px] bg-sky-400/10 rounded-full blur-[100px] animate-pulse-slow"></div>
            <div class="relative animate-float biometric-data">
                <div class="relative w-80 h-80 flex items-center justify-center scanner-ui p-6">
                    <div
                        class="absolute inset-4 border-[3px] border-dashed border-sky-300/60 rounded-full animate-spin-slow">
                    </div>
                    <div class="absolute inset-8 border border-sky-400/30 rounded-full animate-spin-slow"
                        style="animation-direction: reverse; animation-duration: 25s;"></div>
                    <div
                        class="absolute inset-12 bg-white/90 backdrop-blur-xl border-2 border-white rounded-full flex items-center justify-center shadow-[0_0_60px_rgba(14,165,233,0.15)] z-10">
                        <svg class="w-32 h-32 text-slate-700 animate-eye-blink glowing-eye" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3.5" class="fill-sky-100 text-sky-500"></circle>
                            <circle cx="12" cy="12" r="1.5" fill="currentColor" class="text-sky-600"></circle>
                        </svg>
                    </div>
                    <div
                        class="absolute left-1/2 -translate-x-1/2 w-64 h-[3px] bg-gradient-to-r from-transparent via-sky-500 to-transparent shadow-[0_0_20px_rgba(14,165,233,0.8)] animate-scan rounded-full z-20">
                    </div>
                </div>
                <div
                    class="absolute -top-6 -right-6 px-4 py-2 bg-emerald-50 border border-emerald-200 rounded-full text-[10px] tracking-widest text-emerald-600 font-black shadow-sm z-30 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> SENSORS: ACTIVE
                </div>
            </div>
            <div class="mt-12 text-center z-10">
                <h2 class="text-4xl font-black tracking-tighter shimmer-text mb-2 uppercase">Biometric Ocular Scan</h2>
                <p class="text-sky-600 text-sm font-bold tracking-[0.3em] uppercase">Visual Fatigue Detection Engine</p>
            </div>
        </div>

        <div class="w-full lg:w-1/2 flex items-center justify-center p-6 sm:p-12 z-10">
            <div class="glass-card w-full max-w-md rounded-[2.5rem] p-12 relative text-slate-800">
                <div class="flex w-full rounded-full border border-slate-200 p-1.5 mb-10 bg-slate-50 shadow-inner">
                    <a href="login.html"
                        class="flex-1 py-3.5 rounded-full text-center font-bold text-base bg-white text-sky-600 shadow border border-slate-100 transition-all duration-300">
                        LOGIN </a>
                    <a href="register.html"
                        class="flex-1 py-3.5 rounded-full text-center font-bold text-base text-slate-500 hover:text-slate-800 transition-all duration-300">
                        REGISTRASI </a>
                </div>

                <form id="loginForm" class="space-y-7 w-full">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 tracking-widest uppercase ml-4">Email</label>
                        <input type="email" id="inputEmail" placeholder="nama@email.com" required
                            class="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:bg-white focus:border-sky-500 focus:ring-4 focus:ring-sky-500/10 transition-all text-slate-800 placeholder:text-slate-400 font-medium text-base">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 tracking-widest uppercase ml-4">Password</label>
                        <input type="password" id="inputPassword" placeholder="••••••••" required
                            class="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:bg-white focus:border-sky-500 focus:ring-4 focus:ring-sky-500/10 transition-all text-slate-800 placeholder:text-slate-400 font-medium text-base tracking-widest">
                    </div>
                    <div class="flex justify-between items-center px-2">
                        <label class="flex items-center gap-3 text-sm text-slate-500 cursor-pointer group font-medium">
                            <input type="checkbox" id="checkRemember"
                                class="rounded border-slate-300 text-sky-600 focus:ring-sky-500 w-5 h-5">
                            <span class="group-hover:text-slate-800 transition">Simpan Sesi Saya</span>
                        </label>
                        <a href="#"
                            class="text-sm text-sky-600 hover:text-sky-800 hover:underline transition font-bold">Lupa
                            Sandi?</a>
                    </div>

                    <p id="errorMsg"
                        class="hidden text-red-500 text-xs font-bold text-center bg-red-50 py-2 rounded-lg border border-red-100">
                    </p>

                    <button type="submit" id="btnSubmit"
                        class="w-full py-5 bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-400 hover:to-blue-500 text-white font-black rounded-2xl shadow-[0_10px_20px_-10px_rgba(14,165,233,0.8)] transition-all active:scale-[0.98] mt-4 tracking-[0.2em] text-base uppercase flex justify-center items-center gap-3">
                        Login <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7-7m7-7H3" />
                        </svg>
                    </button>
                    <div class="pt-8 text-center border-t border-slate-100">
                        <p class="text-base text-slate-500 font-medium"> Belum Punya Akun? <a href="register.html"
                                class="text-sky-600 font-bold hover:underline ml-1">Daftar Di Sini</a> </p>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer
        class="p-8 text-center text-slate-400 text-xs font-bold tracking-[0.5em] uppercase border-t border-slate-200 relative z-10 bg-white/50">
        &copy; 2026 VISAGE METRICS • RESEARCH & DEVELOPMENT • UNIT TELKOM UNIVERSITY PURWOKERTO
    </footer>
</body>

</html>
