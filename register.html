<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran - Visage Metrics</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    animation: {
                        'pulse-slow': 'pulse 8s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'scan': 'scan 2.5s linear infinite',
                        'spin-slow': 'spin 15s linear infinite',
                        'eye-blink': 'blink 4s ease-in-out infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        scan: { '0%': { top: '10%', opacity: '0' }, '10%': { opacity: '1' }, '90%': { opacity: '1' }, '100%': { top: '90%', opacity: '0' } },
                        blink: { '0%, 90%, 100%': { transform: 'scaleY(1)', opacity: '1' }, '95%': { transform: 'scaleY(0.1)', opacity: '0.4' } },
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-15px)' } }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; overflow-y: auto; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(24px); border: 1px solid rgba(226, 232, 240, 1); box-shadow: 0 40px 100px -20px rgba(14, 165, 233, 0.15); }
        .neural-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(14, 165, 233, 0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(14, 165, 233, 0.08) 1px, transparent 1px); background-size: 40px 40px; z-index: -1; }
        .shimmer-text { background: linear-gradient(90deg, #0f172a, #0ea5e9, #0f172a); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 3s linear infinite; }
        @keyframes shimmer { to { background-position: 200% center; } }
        .scanner-ui { background: linear-gradient(to right, #0ea5e9 4px, transparent 4px) 0 0, linear-gradient(to bottom, #0ea5e9 4px, transparent 4px) 0 0, linear-gradient(to left, #0ea5e9 4px, transparent 4px) 100% 0, linear-gradient(to bottom, #0ea5e9 4px, transparent 4px) 100% 0, linear-gradient(to right, #0ea5e9 4px, transparent 4px) 0 100%, linear-gradient(to top, #0ea5e9 4px, transparent 4px) 0 100%, linear-gradient(to left, #0ea5e9 4px, transparent 4px) 100% 100%, linear-gradient(to top, #0ea5e9 4px, transparent 4px) 100% 100%; background-repeat: no-repeat; background-size: 40px 40px; border-radius: 20px; }
        .scanner-ui::before { content: ''; position: absolute; top: 50%; left: -30px; right: -30px; height: 1px; background: rgba(14, 165, 233, 0.2); z-index: 0; }
        .scanner-ui::after { content: ''; position: absolute; left: 50%; top: -30px; bottom: -30px; width: 1px; background: rgba(14, 165, 233, 0.2); z-index: 0; }
        .biometric-data::before { content: 'BIOMETRIC STREAM\A----------------\AEAR RATIO : 0.32\ASTATUS    : NORMAL\APUPIL TRK : CENTER\AFATIGUE   : LOW\A \AAcquiring points...\A[ OK ]'; position: absolute; top: 20%; right: -120px; font-family: monospace; font-size: 10px; line-height: 1.6; color: #0ea5e9; font-weight: 700; white-space: pre; text-align: left; text-shadow: 0 0 10px rgba(14, 165, 233, 0.4); pointer-events: none; opacity: 0.8; background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(4px); padding: 10px; border-radius: 8px; border: 1px solid rgba(14, 165, 233, 0.2); }
        .glowing-eye { filter: drop-shadow(0 0 15px rgba(14, 165, 233, 0.4)); }
    </style>
</head>

<body class="text-slate-800 font-sans min-h-screen flex flex-col relative selection:bg-sky-200">
    <div class="neural-grid opacity-80"></div>
    
    <nav class="w-full bg-white/80 backdrop-blur-xl border-b border-slate-200 z-50 relative shadow-sm">
        <div class="max-w-[90rem] mx-auto px-6 lg:px-10">
            <div class="flex justify-between items-center h-24">
                <a href="index.html" class="flex items-center gap-4 group">
                    <div class="w-11 h-11 flex items-center justify-center text-sky-500 rounded-xl">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="w-7 h-7 transition-all duration-300 group-hover:scale-110">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                            <circle cx="12" cy="12" r="1" fill="currentColor"></circle>
                        </svg>
                    </div>
                    <div class="font-black text-xl tracking-[0.25em] text-slate-800 uppercase group-hover:text-sky-600 transition">VISAGE METRICS</div>
                </a>
                
                <div>
                    <a href="index.html" class="group flex items-center gap-2 px-4 py-2 text-slate-500 hover:text-sky-600 transition-all font-bold text-xs tracking-widest">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                        </svg>
                        Kembali Ke Home
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex relative z-10 max-w-[90rem] mx-auto w-full">
        <div class="hidden lg:flex w-1/2 flex-col items-center justify-start pt-28 relative overflow-hidden">
            <div class="absolute w-[600px] h-[600px] bg-sky-400/10 rounded-full blur-[100px] animate-pulse-slow"></div>
            <div class="relative animate-float biometric-data">
                <div class="relative w-80 h-80 flex items-center justify-center scanner-ui p-6">
                    <div class="absolute inset-4 border-[3px] border-dashed border-sky-300/60 rounded-full animate-spin-slow"></div>
                    <div class="absolute inset-8 border border-sky-400/30 rounded-full animate-spin-slow" style="animation-direction: reverse; animation-duration: 25s;"></div>
                    <div class="absolute inset-12 bg-white/90 backdrop-blur-xl border-2 border-white rounded-full flex items-center justify-center shadow-[0_0_60px_rgba(14,165,233,0.15)] z-10">
                        <svg class="w-32 h-32 text-slate-700 animate-eye-blink glowing-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3.5" class="fill-sky-100 text-sky-500"></circle>
                            <circle cx="12" cy="12" r="1.5" fill="currentColor" class="text-sky-600"></circle>
                        </svg>
                    </div>
                    <div class="absolute left-1/2 -translate-x-1/2 w-64 h-[3px] bg-gradient-to-r from-transparent via-sky-500 to-transparent shadow-[0_0_20px_rgba(14,165,233,0.8)] animate-scan rounded-full z-20"></div>
                </div>
                <div class="absolute -top-6 -right-6 px-4 py-2 bg-emerald-50 border border-emerald-200 rounded-full text-[10px] tracking-widest text-emerald-600 font-black shadow-sm z-30 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> SENSORS: ACTIVE
                </div>
                <div class="absolute -bottom-6 -left-6 px-4 py-2 bg-white border border-slate-200 rounded-full text-[10px] tracking-widest text-slate-500 font-bold shadow-sm z-30"> LATENCY: 8ms </div>
            </div>
            <div class="mt-12 text-center z-10">
                <h2 class="text-4xl font-black tracking-tighter shimmer-text mb-2 uppercase">Biometric Ocular Scan</h2>
                <p class="text-sky-600 text-sm font-bold tracking-[0.3em] uppercase">Visual Fatigue Detection Engine</p>
            </div>
        </div>

        <div class="w-full lg:w-1/2 flex items-center justify-center p-6 sm:p-12 z-10">
            <div class="glass-card w-full max-w-md rounded-[2.5rem] p-12 relative text-slate-800">
                <div class="flex w-full rounded-full border border-slate-200 p-1.5 mb-10 bg-slate-50 shadow-inner">
                    <a href="login.html" class="flex-1 py-3.5 rounded-full text-center font-bold text-base text-slate-500 hover:text-slate-800 transition-all duration-300"> LOGIN </a>
                    <a href="register.html" class="flex-1 py-3.5 rounded-full text-center font-bold text-base bg-white text-sky-600 shadow border border-slate-100 transition-all duration-300"> REGISTRASI </a>
                </div>
                <form action="login.html" method="GET" class="space-y-6 w-full">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-500 tracking-widest uppercase ml-4">Nama Lengkap</label>
                        <input type="text" name="nama" placeholder="Masukkan Nama..." required class="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:bg-white focus:border-sky-500 focus:ring-4 focus:ring-sky-500/10 transition-all text-slate-800 placeholder:text-slate-400 font-medium text-sm">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-500 tracking-widest uppercase ml-4">Username</label>
                        <input type="text" name="username" placeholder="Masukkan Username..." required class="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:bg-white focus:border-sky-500 focus:ring-4 focus:ring-sky-500/10 transition-all text-slate-800 placeholder:text-slate-400 font-medium text-sm">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-500 tracking-widest uppercase ml-4">Password</label>
                        <input type="password" name="password" placeholder="••••••••" required class="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:bg-white focus:border-sky-500 focus:ring-4 focus:ring-sky-500/10 transition-all text-slate-800 placeholder:text-slate-400 font-medium tracking-widest">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-500 tracking-widest uppercase ml-4">Ulangi Password</label>
                        <input type="password" name="repassword" placeholder="••••••••" required class="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:bg-white focus:border-sky-500 focus:ring-4 focus:ring-sky-500/10 transition-all text-slate-800 placeholder:text-slate-400 font-medium tracking-widest">
                    </div>
                    <button type="submit" class="w-full py-4 bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-400 hover:to-blue-500 text-white font-black rounded-2xl shadow-[0_10px_20px_-10px_rgba(14,165,233,0.8)] transition-all active:scale-[0.98] mt-4 tracking-[0.2em] text-sm uppercase flex justify-center items-center gap-3">
                        REGISTER <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7-7m7-7H3" /></svg>
                    </button>
                    <div class="pt-8 text-center border-t border-slate-100">
                        <p class="text-sm text-slate-500 font-medium"> Sudah memiliki akun? <a href="login.html" class="text-sky-600 font-bold hover:underline ml-1">Login Sekarang</a> </p>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="p-8 text-center text-slate-400 text-xs font-bold tracking-[0.5em] uppercase border-t border-slate-200 relative z-10 bg-white/50">
        &copy; 2026 VISAGE METRICS • RESEARCH & DEVELOPMENT • UNIT TELKOM UNIVERSITY PURWOKERTO
    </footer>
</body>
</html>
