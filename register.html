<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran - Visage Metrics</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    animation: {
                        'pulse-slow': 'pulse 8s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'scan': 'scan 3s linear infinite',
                        'spin-slow': 'spin 12s linear infinite',
                        'eye-blink': 'blink 4s ease-in-out infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        scan: { '0%': { top: '0%' }, '100%': { top: '100%' } },
                        blink: {
                            '0%, 90%, 100%': { transform: 'scaleY(1)', opacity: '1' },
                            '95%': { transform: 'scaleY(0)', opacity: '0.3' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #030712; overflow-x: hidden; }
        
        /* KEMBALI KE DARK GLASSMORPHISM */
        .glass-card {
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(56, 189, 248, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .neural-grid {
            background-image: radial-gradient(rgba(56, 189, 248, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .shimmer-text {
            background: linear-gradient(90deg, #94a3b8, #f8fafc, #94a3b8);
            background-size: 200% auto;
            -webkit-background-clip: text; 
            background-clip: text;         
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }
        
        @keyframes shimmer { to { background-position: 200% center; } }
    </style>
</head>

<body class="text-white font-sans min-h-screen flex flex-col relative selection:bg-blue-500/30">
    <div class="absolute inset-0 neural-grid opacity-50"></div>
    
    <nav class="w-full bg-[#030712]/80 backdrop-blur-xl border-b border-white/5 z-50 relative">
        <div class="max-w-[90rem] mx-auto px-6 lg:px-10">
            <div class="flex justify-between items-center h-24">
                
                <a href="index.html" class="flex items-center gap-3 group">
                    <div class="w-8 h-8 flex items-center justify-center text-blue-400">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 transition-all duration-300 group-hover:scale-110 drop-shadow-[0_0_10px_rgba(56,189,248,0.5)]">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </div>
                    <div class="font-bold text-xl tracking-[0.2em] text-white uppercase group-hover:text-blue-400 transition">VISAGE METRICS</div>
                </a>
                
                <div>
                    <a href="index.html" class="group flex items-center gap-2 text-xs font-bold tracking-widest text-slate-400 hover:text-white transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 group-hover:-translate-x-1 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                        </svg>
                        KEMBALI KE HOME
                    </a>
                </nav>
            
            </div>
        </div>
    </nav>

    <main class="flex-grow flex relative z-10">
        <div class="hidden lg:flex w-1/2 flex-col items-center justify-center relative overflow-hidden">
            <div class="absolute w-[500px] h-[500px] bg-blue-600/10 rounded-full blur-[120px] animate-pulse-slow"></div>
            
            <div class="relative animate-float">
                <div class="relative w-80 h-80 flex items-center justify-center">
                    <div class="absolute inset-0 border-2 border-dashed border-blue-500/20 rounded-full animate-spin-slow"></div>
                    <div class="absolute inset-4 border border-blue-400/10 rounded-full animate-spin-slow" style="animation-direction: reverse; animation-duration: 20s;"></div>
                    
                    <div class="absolute inset-10 bg-slate-900/50 backdrop-blur-xl border border-blue-500/30 rounded-full flex items-center justify-center shadow-[0_0_50px_rgba(37,99,235,0.2)]">
                        <svg class="w-32 h-32 text-blue-400 animate-eye-blink" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3" class="fill-blue-500/10"></circle>
                            <circle cx="12" cy="12" r="1" fill="currentColor"></circle>
                        </svg>
                    </div>
                    <div class="absolute left-1/2 -translate-x-1/2 w-48 h-1 bg-blue-400/60 shadow-[0_0_15px_rgba(56,189,248,1)] animate-scan opacity-80 rounded-full"></div>
                </div>

                <div class="absolute -top-10 -right-10 px-4 py-2 bg-blue-900/30 border border-blue-500/30 rounded-lg text-[10px] tracking-widest text-blue-300 backdrop-blur-md">
                    SCANNING: ACTIVE
                </div>
                <div class="absolute -bottom-5 -left-10 px-4 py-2 bg-slate-900/50 border border-slate-700/50 rounded-lg text-[10px] tracking-widest text-slate-400 backdrop-blur-md">
                    LATENCY: 12ms
                </div>
            </div>

            <div class="mt-16 text-center">
                <h2 class="text-3xl font-black tracking-tighter shimmer-text mb-2 uppercase">Core Engine Intelligence</h2>
                <p class="text-slate-500 text-xs tracking-[0.4em] uppercase">Deep Learning Powered Metrics</p>
            </div>
        </div>

        <div class="w-full lg:w-1/2 flex items-center justify-center p-6 sm:p-12">
            <div class="glass-card w-full max-w-md rounded-[3rem] p-10 shadow-2xl relative text-white">
                
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-extrabold tracking-tight mb-2 text-[#4A7298]">Visage Metrics</h1>
                </div>

                <div class="flex w-full rounded-full border-2 border-slate-700 p-1 mb-8 bg-slate-900/50">
                    <a href="login.html" class="flex-1 py-3 rounded-full text-center font-bold text-slate-500 hover:text-slate-300 transition-all duration-300">
                        LOGIN
                    </a>
                    <a href="register.html" class="flex-1 py-3 rounded-full text-center font-bold bg-[#4A7298] text-white shadow-md transition-all duration-300">
                        REGISTER
                    </a>
                </div>

                <form action="login.html" method="GET" class="space-y-4 w-full">
                    <div class="space-y-1">
                        <input type="text" name="nama" placeholder="Nama Lengkap" required
                            class="w-full px-6 py-4 bg-slate-950/50 border-2 border-white/5 rounded-full outline-none focus:border-[#4A7298] transition text-white placeholder:text-slate-600 font-medium shadow-sm">
                    </div>
                    
                    <div class="space-y-1">
                        <input type="text" name="username" placeholder="Username Baru" required
                            class="w-full px-6 py-4 bg-slate-950/50 border-2 border-white/5 rounded-full outline-none focus:border-[#4A7298] transition text-white placeholder:text-slate-600 font-medium shadow-sm">
                    </div>

                    <div class="space-y-1">
                        <input type="password" name="password" placeholder="Password" required
                            class="w-full px-6 py-4 bg-slate-950/50 border-2 border-white/5 rounded-full outline-none focus:border-[#4A7298] transition text-white placeholder:text-slate-600 font-medium shadow-sm">
                    </div>

                    <div class="space-y-1">
                        <input type="password" name="repassword" placeholder="Ulangi Password" required
                            class="w-full px-6 py-4 bg-slate-950/50 border-2 border-white/5 rounded-full outline-none focus:border-[#4A7298] transition text-white placeholder:text-slate-600 font-medium shadow-sm">
                    </div>

                    <button type="submit"
                        class="w-full py-4 bg-[#4A7298] hover:bg-[#3b5d7d] text-white font-extrabold rounded-full shadow-lg shadow-blue-900/10 transition-all active:scale-[0.98] mt-6 tracking-widest text-sm uppercase">
                        REGISTER
                    </button>
                    
                    <div class="pt-6 text-center">
                        <p class="text-sm text-slate-500">
                            Sudah memiliki akun? 
                            <a href="login.html" class="text-[#4A7298] font-bold hover:underline">Login Sekarang</a>
                        </p>
                    </div>
                </form>

            </div>
        </div>
    </main>

    <footer class="p-8 text-center text-slate-700 text-[10px] tracking-[0.5em] uppercase border-t border-white/5 relative z-10">
        &copy; 2026 VISAGE METRICS • RESEARCH & DEVELOPMENT • UNIT TELKOM UNIVERSITY PURWOKERTO
    </footer>
</body>

</html>
